# Perfil de desarrollo (local)

# Nombre del proyecto
spring.application.name= Udipsai

# Puerto del servidor
server.port= 8080

# Configuraciï¿½n de JDBC (Base de datos)
spring.datasource.url=jdbc:postgresql://localhost:5432/udipsai #URL de la base de datos
spring.datasource.username= udipsai_user
spring.datasource.password= password
spring.datasource.driver-class-name= org.postgresql.Driver

# JPA Hibernate (Crea y actualiza las tablas de la base de datos)
# Se usa auto actualizarSede solo en este perfil
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Configuracion de JWT
jwt.secret=tu_clave_secreta_muy_segura_aqui_cambiar_en_produccion
jwt.expiration=3600000
jwt.refreshExpiration=604800000

# Logging
logging.level.root=INFO
logging.level.com.ucacue.udipsai=DEBUG
logging.level.org.springframework.security=DEBUG

# Swagger
spring.data.rest.detection-strategy=annotated

# Storage
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.address=localhost